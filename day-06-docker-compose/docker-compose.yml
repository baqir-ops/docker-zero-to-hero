services:

  mysql-db:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
    networks:
      - appnet

  flask-app:
    image: baqirops/flask-app:v1
    container_name: flask-app
    depends_on:
      - mysql-db
    networks:
      - appnet

  nginx-web:
    image: nginx
    container_name: nginx-web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask-app
    networks:
      - appnet

networks:
  appnet:
